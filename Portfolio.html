<body>
<div id="root"></div>

<script src="src/data.js?v=3"></script>
<script type="text/babel" src="src/Hero.jsx"></script>
<script type="text/babel" src="src/About.jsx"></script>
<script type="text/babel" src="src/Featured.jsx"></script>
<script type="text/babel" src="src/Sections.jsx"></script>

<script type="text/babel">
const { useEffect, useState } = React;

function App() {
  const [dark, setDark] = useState(() => {
    try { return localStorage.getItem('theme') === 'dark'; } catch { return false; }
  });

  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
    try { localStorage.setItem('theme', dark ? 'dark' : 'light'); } catch {}
  }, [dark]);

  // scroll reveal
  useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
    }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);

  return (
    <>
      <Cursor />
      <Nav onToggleTheme={() => setDark(d => !d)} dark={dark} />
      <main>
        <Hero />
        <Featured />
        <About />
        <Marquee />
        <Archive />
        <Experience />
        <Contact />
      </main>
      <FooterBar />
      <Tweaks dark={dark} setDark={setDark} />
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
